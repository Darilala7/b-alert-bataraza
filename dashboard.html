<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MDRRMO - Medical Monitoring Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e3f2fd; margin: 0; }
        .nav { background: #1565c0; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid #2196f3; }
        .card.resolved { border-left: 10px solid #2e7d32; opacity: 0.7; }
        .warning { color: #1565c0; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .info { margin: 5px 0; color: #333; }
        .btn-resolved { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 100%; }
        .btn-maps { display: block; background: #1565c0; color: white; text-decoration: none; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 15px; text-align: center; }
        .btn-maps:hover { background: #0d47a1; }
    </style>
</head>
<body>
    <div class="nav">🏥 MDRRMO MEDICAL MONITORING</div>
    <div class="container" id="alerts-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk",
            projectId: "b-alert-bataraza",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SIREN & AUDIO LOGIC ---
        const siren = new Audio('siren.mp3');
        siren.loop = false;

        // Unlock audio on first click (Browser requirement)
        window.addEventListener('click', () => {
            siren.play().then(() => {
                siren.pause();
                siren.currentTime = 0;
            }).catch(e => console.log("Audio unlock ready."));
        }, { once: true });

        let isInitialLoad = true;

        const q = query(
            collection(db, "alerts"), 
            where("category", "==", "Medical"), 
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('alerts-list');
            
            snapshot.docChanges().forEach((change) => {
                // Tutunog lang kung may bagong alert (added) at hindi ito ang unang load ng page
                if (change.type === "added" && !isInitialLoad) {
                    const alertData = change.doc.data();
                    if (alertData.status === "Pending") {
                        siren.play().catch(e => console.log("Click the page to enable sound."));
                    }
                }
            });

            isInitialLoad = false;
            list.innerHTML = "";

            snapshot.forEach((alertDoc) => {
                const data = alertDoc.data();
                const id = alertDoc.id;
                const isResolved = data.status === "Resolved";
                
                // FIXED: Tama na ang link format para sa Google Maps
                const gMapsLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;

                const card = document.createElement('div');
                card.className = `card ${isResolved ? 'resolved' : ''}`;
                card.innerHTML = `
                    <div class="warning">${isResolved ? '✅ RESOLVED' : '🚑 MEDICAL EMERGENCY'}</div>
                    <div class="info"><strong>Sender:</strong> ${data.sender}</div>
                    <div class="info"><strong>Time:</strong> ${data.timestamp ? data.timestamp.toDate().toLocaleString() : "Just now"}</div>
                    <div class="info"><strong>Accuracy:</strong> ${data.has_real_gps ? 'High (GPS)' : 'Approximate'}</div>
                    
                    <a href="${gMapsLink}" target="_blank" class="btn-maps">📍 VIEW ON GOOGLE MAPS</a>
                    
                    ${!isResolved ? `<button class="btn-resolved" onclick="markAsResolved('${id}')">MARK AS RESOLVED</button>` : ''}
                `;
                list.appendChild(card);
            });
        });

        window.markAsResolved = async (id) => {
            try {
                await updateDoc(doc(db, "alerts", id), { status: "Resolved" });
            } catch (e) {
                console.error("Error updating document: ", e);
            }
        };
    </script>
</body>
</html>
