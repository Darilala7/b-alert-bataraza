<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MDRRMO - Medical Monitoring Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e3f2fd; margin: 0; }
        .nav { background: #1565c0; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; position: relative; }
        .status-indicator { position: absolute; right: 20px; top: 20px; font-size: 14px; padding: 5px 10px; border-radius: 20px; background: #4caf50; color: white; }
        .status-offline { background: #f44336; }
        .container { max-width: 900px; margin: auto; padding: 10px; }
        
        /* Map Design */
        #map { width: 100%; height: 300px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid white; }

        /* Counter Design */
        .counter-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .counter-box { 
            background: white; padding: 15px; border-radius: 8px; flex: 1; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #d32f2f; 
        }
        .counter-box.resolved { border-left-color: #2e7d32; }
        .counter-box h3 { margin: 0; font-size: 11px; color: #888; text-transform: uppercase; }
        .counter-box .count { font-size: 24px; font-weight: bold; display: block; color: #333; }

        /* Manual Form Design */
        .manual-form { 
            background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-bottom: 20px; border-top: 5px solid #2e7d32; 
        }
        .manual-form input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .btn-gps { background: #ef6c00; color: white; border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-upload { width: 100%; margin-top: 15px; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Card Design */
        .card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid #2196f3; transition: 0.3s; }
        .card.resolved { border-left: 10px solid #2e7d32; opacity: 0.7; }
        
        @keyframes critical-flash {
            0% { background-color: white; }
            50% { background-color: #ffebee; border-left-color: #ff1744; }
            100% { background-color: white; }
        }
        .card.critical { animation: critical-flash 1.5s infinite; border-left: 10px solid #ff1744 !important; }
        .critical-label { background: #ff1744; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; vertical-align: middle; font-weight: bold; }

        .warning { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .info { margin: 5px 0; color: #333; }
        .time-ago { color: #d32f2f; font-weight: bold; font-size: 0.9em; }
        .btn-resolved { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 100%; }
        .btn-maps { display: block; background: #1565c0; color: white; text-decoration: none; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="nav">
        🏥 MDRRMO MEDICAL MONITORING
        <span id="connection-status" class="status-indicator">ONLINE</span>
    </div>

    <div class="container">
        <div class="counter-container">
            <div class="counter-box">
                <h3>Pending Alerts</h3>
                <span id="pending-count" class="count">0</span>
            </div>
            <div class="counter-box resolved">
                <h3>Resolved Today</h3>
                <span id="resolved-count" class="count">0</span>
            </div>
        </div>

        <div id="map"></div>

        <div class="manual-form">
            <h3 style="color: #2e7d32; margin-top: 0; font-size: 16px;">📝 Manual SMS Report Entry</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="m-name" placeholder="Sender Name (from SMS)">
                <input type="tel" id="m-phone" placeholder="Phone Number">
                <div style="display: flex; gap: 5px; grid-column: span 2;">
                    <input type="text" id="m-lat" placeholder="Latitude" style="flex: 1;">
                    <input type="text" id="m-lng" placeholder="Longitude" style="flex: 1;">
                    <button class="btn-gps" onclick="getMapFromCenter()">📍 GPS</button>
                </div>
            </div>
            <button class="btn-upload" onclick="submitManualReport()">UPLOAD TO SYSTEM</button>
        </div>

        <div id="alerts-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc, addDoc, enableNetwork, disableNetwork, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk", projectId: "b-alert-bataraza" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- MAP INITIALIZATION ---
        let map = L.map('map').setView([8.3542, 117.3515], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- MANUAL FORM FUNCTIONS ---
        window.getMapFromCenter = () => {
            const center = map.getCenter();
            document.getElementById('m-lat').value = center.lat.toFixed(6);
            document.getElementById('m-lng').value = center.lng.toFixed(6);
        };

        window.submitManualReport = async () => {
            const name = document.getElementById('m-name').value.trim();
            const phone = document.getElementById('m-phone').value.trim();
            const lat = parseFloat(document.getElementById('m-lat').value);
            const lng = parseFloat(document.getElementById('m-lng').value);

            if (!name || !phone || isNaN(lat) || isNaN(lng)) {
                alert("Please fill in all fields correctly.");
                return;
            }

            try {
                await addDoc(collection(db, "alerts"), {
                    sender: name, phone: phone, category: "Medical",
                    latitude: lat, longitude: lng, photo_proof: "Manual Entry (SMS)",
                    status: "Pending", source: "Manual", timestamp: serverTimestamp()
                });
                alert("SMS Report encoded!");
                document.getElementById('m-name').value = ""; document.getElementById('m-phone').value = "";
                document.getElementById('m-lat').value = ""; document.getElementById('m-lng').value = "";
            } catch (e) { alert("Error: " + e.message); }
        };

        // --- EXISTING DASHBOARD FUNCTIONS ---
        function getTimeAgo(timestamp) {
            if (!timestamp) return "Just now";
            const seconds = Math.floor((new Date() - timestamp.toDate()) / 1000);
            let interval = Math.floor(seconds / 3600);
            if (interval >= 1) return interval + "h ago";
            interval = Math.floor(seconds / 60);
            if (interval >= 1) return interval + "m ago";
            return "Just now";
        }

        setInterval(() => {
            document.querySelectorAll('.time-ago').forEach(el => {
                const ts = el.getAttribute('data-ts');
                if (ts) {
                    const date = new Date(parseInt(ts));
                    el.innerText = getTimeAgo({ toDate: () => date });
                }
            });
        }, 30000);

        setInterval(() => {
            document.querySelectorAll('.card').forEach(card => {
                if (card.classList.contains('resolved')) return;
                const timeAgoEl = card.querySelector('.time-ago');
                const ts = timeAgoEl ? parseInt(timeAgoEl.getAttribute('data-ts')) : null;
                if (ts && Math.floor((new Date() - new Date(ts)) / 60000) >= 5) {
                    if (!card.classList.contains('critical')) {
                        card.classList.add('critical');
                        const warningDiv = card.querySelector('.warning');
                        if (warningDiv && !warningDiv.querySelector('.critical-label')) {
                            const label = document.createElement('span');
                            label.className = 'critical-label'; label.innerText = '⚠️ OVERDUE';
                            warningDiv.appendChild(label);
                        }
                    }
                }
            });
        }, 30000);

        const statusEl = document.getElementById('connection-status');
        window.addEventListener('online', () => { enableNetwork(db); statusEl.innerText = "ONLINE"; statusEl.classList.remove('status-offline'); });
        window.addEventListener('offline', () => { disableNetwork(db); statusEl.innerText = "OFFLINE"; statusEl.classList.add('status-offline'); });

        const siren = new Audio('siren.mp3');
        if (Notification.permission !== "granted") Notification.requestPermission();
        window.addEventListener('click', () => { siren.play().then(() => { siren.pause(); siren.currentTime = 0; }); }, { once: true });

        let isInitialLoad = true;
        const q = query(collection(db, "alerts"), where("category", "==", "Medical"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('alerts-list');
            let pCount = 0; let rCount = 0;

            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !isInitialLoad && change.doc.data().status === "Pending") {
                    siren.play().catch(() => {});
                    if (Notification.permission === "granted") new Notification("🚑 MEDICAL EMERGENCY", { body: `Sender: ${change.doc.data().sender}` });
                }
            });

            isInitialLoad = false;
            list.innerHTML = "";
            snapshot.forEach((alertDoc) => {
                const data = alertDoc.data();
                data.status === "Pending" ? pCount++ : rCount++;
                const tsDate = data.timestamp ? data.timestamp.toDate() : new Date();
                const ts = tsDate.getTime();
                const minutesPassed = Math.floor((new Date() - tsDate) / 60000);
                const isCritical = data.status === "Pending" && minutesPassed >= 5;
                const gMapsLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                
                const card = document.createElement('div');
                card.className = `card ${data.status === "Resolved" ? 'resolved' : ''} ${isCritical ? 'critical' : ''}`;
                card.innerHTML = `
                    <div class="warning" style="color: ${data.status === 'Resolved' ? '#2e7d32' : '#1565c0'};">
                        ${data.status === "Resolved" ? '✅ RESOLVED' : '🚑 MEDICAL EMERGENCY'}
                        ${isCritical ? '<span class="critical-label">⚠️ OVERDUE</span>' : ''}
                    </div>
                    <div class="info"><strong>Sender:</strong> ${data.sender} ${data.source === 'Manual' ? '(SMS Entry)' : ''}</div>
                    <div class="info"><strong>Phone:</strong> ${data.phone || 'N/A'}</div>
                    <div class="info"><strong>Status:</strong> <span class="time-ago" data-ts="${ts}">${getTimeAgo(data.timestamp)}</span></div>
                    ${data.photo_proof && data.photo_proof !== "No photo" && data.photo_proof !== "Manual Entry (SMS)" ? 
                        `<span style="color: #b71c1c; font-weight: bold; cursor: pointer; text-decoration: underline; display: block; margin-top: 8px; font-size: 14px;" onclick="this.nextElementSibling.style.display='block'; this.style.display='none'">🖼️ VIEW PHOTO</span>
                         <img src="${data.photo_proof}" style="width: 100%; max-width: 400px; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #ddd;" onclick="this.style.display='none'; this.previousElementSibling.style.display='block'">` : ''}
                    <a href="${gMapsLink}" target="_blank" class="btn-maps">📍 VIEW ON GOOGLE MAPS</a>
                    ${data.status !== "Resolved" ? `<button class="btn-resolved" onclick="markAsResolved('${alertDoc.id}')">MARK AS RESOLVED</button>` : ''}
                `;
                list.appendChild(card);
            });
            document.getElementById('pending-count').innerText = pCount;
            document.getElementById('resolved-count').innerText = rCount;
        });

        window.markAsResolved = async (id) => { 
            if (confirm("Mark this as RESOLVED?")) {
                try { await updateDoc(doc(db, "alerts", id), { status: "Resolved", resolved_at: serverTimestamp() }); }
                catch (e) { alert("Error updating status."); }
            }
        };
    </script>
</body>
</html>
