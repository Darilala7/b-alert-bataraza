<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MDRRMO - Medical Monitoring</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e3f2fd; margin: 0; }
        .nav { background: #1565c0; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; border-left: 12px solid #2196f3; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card.resolved { opacity: 0.6; border-left-color: #4caf50; }
        .btn-maps { display: block; background: #1565c0; color: white; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; margin-top: 15px; text-align: center; }
        .btn-resolved { background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="nav">🏥 MDRRMO MEDICAL EMERGENCY DASHBOARD</div>
    <div class="container" id="alerts-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk", projectId: "b-alert-bataraza" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FILTER: Medical alerts lang
        const q = query(collection(db, "alerts"), where("category", "==", "Medical"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('alerts-list');
            list.innerHTML = "";
            snapshot.forEach((alertDoc) => {
                const data = alertDoc.data();
                const id = alertDoc.id;
                const isResolved = data.status === "Resolved";
                const gMapsLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;

                const card = document.createElement('div');
                card.className = `card ${isResolved ? 'resolved' : ''}`;
                card.innerHTML = `
                    <div style="color:#1565c0; font-weight:bold;">🚑 MEDICAL EMERGENCY REPORTED</div>
                    <div style="margin:5px 0;"><strong>Sender:</strong> ${data.sender}</div>
                    <div style="margin:5px 0;"><strong>Time:</strong> ${data.timestamp ? data.timestamp.toDate().toLocaleString() : "Just now"}</div>
                    <a href="${gMapsLink}" target="_blank" class="btn-maps">📍 VIEW PATIENT LOCATION</a>
                    ${!isResolved ? `<button class="btn-resolved" onclick="markAsResolved('${id}')">MARK AS RESOLVED</button>` : '✅ RESOLVED'}
                `;
                list.appendChild(card);
            });
        });

        window.markAsResolved = async (id) => { await updateDoc(doc(db, "alerts", id), { status: "Resolved" }); };
    </script>
</body>
</html>
