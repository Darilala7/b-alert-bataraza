<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MDRRMO Monitoring Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eceff1; margin: 0; }
        .nav { background: #0d47a1; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid #d32f2f; }
        .card.resolved { border-left: 10px solid #2e7d32; opacity: 0.7; }
        .warning { color: #d32f2f; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
        .info { margin: 5px 0; color: #333; }
        .btn-maps { display: block; background: #0d47a1; color: white; text-decoration: none; padding: 15px; border-radius: 5px; font-weight: bold; margin-top: 15px; text-align: center; }
        .btn-resolved { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="nav">MDRRMO MONITORING DASHBOARD</div>
    <div class="container" id="alerts-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk",
            projectId: "b-alert-bataraza",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const siren = new Audio('siren.mp3');
        let isInitialLoad = true;

        onSnapshot(query(collection(db, "alerts"), orderBy("timestamp", "desc")), (snapshot) => {
            const list = document.getElementById('alerts-list');
            
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !isInitialLoad && change.doc.data().status === "Pending") {
                    siren.play().catch(e => console.log("Sound ready."));
                }
            });

            isInitialLoad = false;
            list.innerHTML = "";

            snapshot.forEach((alertDoc) => {
                const data = alertDoc.data();
                const id = alertDoc.id;
                const isResolved = data.status === "Resolved";
                const lat = data.latitude;
                const lng = data.longitude;
                
                // Link na tumuturo sa live location
                const gMapsLink = `https://www.google.com/maps?q=${lat},${lng}`;

                const card = document.createElement('div');
                card.className = `card ${isResolved ? 'resolved' : ''}`;
                card.innerHTML = `
                    <div class="warning">${isResolved ? '✅ RESOLVED' : '⚠️ EMERGENCY ALERT'}</div>
                    <div class="info"><strong>Sender:</strong> ${data.sender}</div>
                    <div class="info"><strong>Time:</strong> ${data.timestamp ? data.timestamp.toDate().toLocaleString() : "Just now"}</div>
                    <div class="info"><strong>Loc Type:</strong> ${data.has_real_gps ? "📍 Live GPS" : "⚠️ Backup"}</div>
                    
                    <a href="${gMapsLink}" target="_blank" class="btn-maps">📍 VIEW LIVE LOCATION</a>
                    
                    ${!isResolved ? `<button class="btn-resolved" onclick="markAsResolved('${id}')">MARK AS RESOLVED</button>` : ''}
                `;
                list.appendChild(card);
            });
        });

        window.markAsResolved = async (id) => {
            await updateDoc(doc(db, "alerts", id), { status: "Resolved" });
        };
    </script>
</body>
</html>
