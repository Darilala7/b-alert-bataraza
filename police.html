<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POLICE - Emergency Monitoring</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e8eaf6; margin: 0; }
        .nav { background: #1a237e; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; border-left: 12px solid #3f51b5; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card.resolved { opacity: 0.6; border-left-color: #4caf50; }
        .btn-maps { display: block; background: #3f51b5; color: white; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; margin-top: 15px; text-align: center; }
        .btn-resolved { background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        .info { margin: 5px 0; color: #333; }
    </style>
</head>
<body>
    <div class="nav">🚓 POLICE EMERGENCY DASHBOARD</div>
    <div class="container" id="alerts-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk", 
            projectId: "b-alert-bataraza" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SIREN & AUDIO LOGIC ---
        const siren = new Audio();
        siren.src = 'siren.mp3';
        siren.load();

        // Unlock audio on first click
        window.addEventListener('click', () => {
            siren.play().then(() => {
                siren.pause();
                siren.currentTime = 0;
                console.log("🔊 Siren Audio Unlocked!");
            }).catch(e => console.log("Audio waiting for user..."));
        }, { once: true });

        let isInitialLoad = true;

        const q = query(collection(db, "alerts"), where("category", "==", "Police"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('alerts-list');

            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !isInitialLoad) {
                    const alertData = change.doc.data();
                    if (alertData.status === "Pending") {
                        siren.play().catch(e => console.log("Interaction needed."));
                    }
                }
            });

            isInitialLoad = false;
            list.innerHTML = "";

            snapshot.forEach((alertDoc) => {
                const data = alertDoc.data();
                const id = alertDoc.id;
                const isResolved = data.status === "Resolved";
                
                // FIXED: Tama na ang interpolation `${}`
                const gMapsLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;

                const card = document.createElement('div');
                card.className = `card ${isResolved ? 'resolved' : ''}`;
                card.innerHTML = `
                    <div style="color:#1a237e; font-weight:bold;">${isResolved ? '✅ RESOLVED' : '🚨 POLICE ASSISTANCE REQUIRED'}</div>
                    <div class="info"><strong>Sender:</strong> ${data.sender}</div>
                    <div class="info"><strong>Time:</strong> ${data.timestamp ? data.timestamp.toDate().toLocaleString() : "Just now"}</div>
                    <div class="info"><strong>Location Method:</strong> ${data.has_real_gps ? 'GPS' : 'Network/Estimated'}</div>
                    
                    <a href="${gMapsLink}" target="_blank" class="btn-maps">📍 RESPOND TO LOCATION</a>
                    ${!isResolved ? `<button class="btn-resolved" onclick="markAsResolved('${id}')">MARK AS RESOLVED</button>` : ''}
                `;
                list.appendChild(card);
            });
        });

        window.markAsResolved = async (id) => { 
            await updateDoc(doc(db, "alerts", id), { status: "Resolved" }); 
        };
    </script>
</body>
</html>
