<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-ALERT SOS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; background-color: #f4f4f4; }
        .header { background-color: #e65100; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { padding: 30px 20px; }
        
        /* Category Selection Styles */
        .category-label { font-weight: bold; margin-bottom: 15px; color: #333; display: block; }
        .categories { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .chip { 
            padding: 10px 20px; border-radius: 20px; border: 2px solid #ccc; 
            background: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .chip.active { background: #e65100; color: white; border-color: #e65100; }

        .sos-btn { 
            background: radial-gradient(#ff1744, #b71c1c); color: white; border: none; 
            width: 250px; height: 250px; border-radius: 50%; 
            font-size: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(183, 28, 28, 0.4);
            transition: transform 0.2s;
            margin-top: 10px;
        }
        .sos-btn:active { transform: scale(0.95); }
        #status { margin-top: 30px; font-size: 18px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">B-ALERT BATARAZA</div>
    <div class="container">
        <span class="category-label">Select Type of Emergency:</span>
        <div class="categories" id="categoryGroup">
            <div class="chip active" onclick="selectCategory('Medical', this)">Medical 🏥</div>
            <div class="chip" onclick="selectCategory('Fire', this)">Fire 🚒</div>
            <div class="chip" onclick="selectCategory('Police', this)">Police 👮</div>
        </div>

        <button class="sos-btn" onclick="triggerSOS()">SOS</button>
        <p id="status">Ready to send emergency alert</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk",
            authDomain: "b-alert-bataraza.firebaseapp.com",
            projectId: "b-alert-bataraza",
            storageBucket: "b-alert-bataraza.firebasestorage.app",
            messagingSenderId: "482644532182",
            appId: "1:482644532182:web:08c5ad48bb227e0b4fe277"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. DEFINE ANG VARIABLE PARA SA CATEGORY
        let selectedCategory = "Medical"; 

        // 2. FUNCTION PARA SA PAGPILI NG CATEGORY
        window.selectCategory = function(cat, element) {
            selectedCategory = cat;
            // Alisin ang 'active' class sa lahat at ilagay sa pinili
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            if (navigator.vibrate) { navigator.vibrate(50); } // Konting vibrate lang pag pindot
        };

        window.triggerSOS = function() {
    const statusText = document.getElementById('status');
    statusText.innerText = "Refining location... Please wait.";

    const options = {
        enableHighAccuracy: true,
        timeout: 15000, // Binigyan natin ng 15 seconds para makahanap ng satellite
        maximumAge: 0   // Hindi tayo gagamit ng lumang (cached) location
    };

    if (navigator.geolocation) {
        // Ginagamit natin ang watchPosition para "ma-lock" ang tamang coordinates
        const watchId = navigator.geolocation.watchPosition(
            (position) => {
                // Kung ang accuracy ay less than 100 meters, sapat na iyon para i-send
                if (position.coords.accuracy < 100) {
                    navigator.geolocation.clearWatch(watchId); // I-stop na ang pag-track
                    sendToFirebase(position.coords.latitude, position.coords.longitude, true);
                }
            },
            (error) => {
                navigator.geolocation.clearWatch(watchId);
                sendToFirebase(8.3542, 117.3515, false); // Backup Town Proper
            },
            options
        );
    }
};
    </script>
</body>
</html>
