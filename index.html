<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-ALERT SOS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; background-color: #f4f4f4; }
        .header { background-color: #e65100; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { padding: 50px 20px; }
        .sos-btn { 
            background: radial-gradient(#ff1744, #b71c1c); color: white; border: none; 
            width: 250px; height: 250px; border-radius: 50%; 
            font-size: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(183, 28, 28, 0.4);
            transition: transform 0.2s;
        }
        .sos-btn:active { transform: scale(0.95); }
        #status { margin-top: 30px; font-size: 18px; color: #555; }
    </style>
</head>
<body>
    <div class="header">B-ALERT BATARAZA</div>
    <div class="container">
        <button class="sos-btn" onclick="triggerSOS()">SOS</button>
        <p id="status">Ready to send emergency alert</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk",
            authDomain: "b-alert-bataraza.firebaseapp.com",
            projectId: "b-alert-bataraza",
            storageBucket: "b-alert-bataraza.firebasestorage.app",
            messagingSenderId: "482644532182",
            appId: "1:482644532182:web:08c5ad48bb227e0b4fe277"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.triggerSOS = function() {
            // VIBRATION: Mag-vibrate ang phone ng 500ms
            if (navigator.vibrate) { navigator.vibrate(500); }

            const statusText = document.getElementById('status');
            statusText.innerText = "Locating & Sending SOS...";
            statusText.style.color = "#e65100";

            // BACKUP: Bataraza Central School area (Hindi na sa dagat)
            const backupLat = 8.3542; 
            const backupLng = 117.3515; 

            const sendToFirebase = async (lat, lng, isRealGPS) => {
            try {
                await addDoc(collection(db, "alerts"), {
                sender: "Ella - Student OJT",
                category: selectedCategory, // ETO ANG DINAGDAG NATING FIELD
                latitude: lat,
                longitude: lng,
                status: "Pending",
                has_real_gps: isRealGPS,
                timestamp: serverTimestamp()
            });
                statusText.innerText = `✅ ${selectedCategory} SOS SENT!`;
                statusText.style.color = "green";
            } catch (e) {
                statusText.innerText = "❌ Error sending alert.";
                console.error(e);
            }
        };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => { sendToFirebase(position.coords.latitude, position.coords.longitude, true); },
                    (error) => { sendToFirebase(backupLat, backupLng, false); },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                sendToFirebase(backupLat, backupLng, false);
            }
        };
    </script>
</body>
</html>
