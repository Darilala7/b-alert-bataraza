<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B-ALERT SOS</title>
    <style>
        :root { --primary: #e65100; --danger: #b71c1c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        /* Registration Overlay */
        #registration-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:white;
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; width: 100%; }

        .container { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        
        /* Photo Preview */
        #photo-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; display: none; margin-bottom: 10px; border: 2px solid var(--primary); }

        .sos-btn { 
            background: radial-gradient(#ff1744, #b71c1c); color: white; border: none; 
            width: 220px; height: 220px; border-radius: 50%; font-size: 40px; font-weight: bold;
            box-shadow: 0 10px 30px rgba(183, 28, 28, 0.4); transition: transform 0.2s;
        }
        .sos-btn:active { transform: scale(0.95); }
        
        .chip-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .chip { padding: 10px 20px; border-radius: 20px; border: 1px solid #ccc; background: white; font-size: 14px; transition: 0.3s; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .action-btn { background: #eee; border: none; padding: 12px 20px; border-radius: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; }

        /* Emergency Lock Overlay */
        #lock-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); color: white; z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <div class="spinner" id="loading-spinner"></div>
        <h1 id="lock-header" style="margin: 0;">SENDING SOS...</h1>
        <p id="lock-msg" style="font-size: 18px; line-height: 1.5;">Please wait. Communicating with Bataraza Responders.</p>
        <div style="margin-top: 50px; color: #666; font-size: 14px;">B-ALERT BATARAZA EMERGENCY SYSTEM</div>
    </div>

    <div id="registration-overlay">
        <h2>User Verification</h2>
        <p style="color: #666; text-align: center;">Kailangan ang iyong impormasyon para sa mabilis at tamang pag-responde.</p>
        <input type="text" id="user-name" placeholder="Buong Pangalan (Full Name)">
        <input type="tel" id="user-phone" placeholder="Phone Number (e.g. 09123456789)">
        <button class="save-btn" onclick="saveUserInfo()">PROCEED TO APP</button>
    </div>

    <div class="header">B-ALERT BATARAZA</div>

    <div class="container">
        <div class="chip-container">
            <div class="chip active" onclick="selectCat('Medical', this)">Medical 🏥</div>
            <div class="chip" onclick="selectCat('Fire', this)">Fire 🚒</div>
            <div class="chip" onclick="selectCat('Police', this)">Police 👮</div>
        </div>

        <div style="text-align: center;">
            <img id="photo-preview" src="">
            <br>
            <button class="action-btn" onclick="document.getElementById('camera-input').click()">📸 TAKE PHOTO PROOF</button>
            <input type="file" id="camera-input" accept="image/*" capture="camera" style="display:none" onchange="previewPhoto(this)">
        </div>

        <button class="sos-btn" id="mainSosBtn" onclick="startCountdown()">SOS</button>
        
        <p id="status" style="font-weight: bold; color: #555;">Ready</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk", projectId: "b-alert-bataraza" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedCategory = "Medical";
        let capturedBase64 = null;

        window.onload = () => {
            if(localStorage.getItem('b_alert_user')) {
                document.getElementById('registration-overlay').style.display = 'none';
            }
        };

        window.saveUserInfo = () => {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();
            if(name && phone) {
                localStorage.setItem('b_alert_user', JSON.stringify({name, phone}));
                document.getElementById('registration-overlay').style.display = 'none';
            } else { alert("Mangyaring punan ang lahat ng fields."); }
        };

        window.selectCat = (cat, el) => {
            selectedCategory = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        window.previewPhoto = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('photo-preview').src = e.target.result;
                    document.getElementById('photo-preview').style.display = 'block';
                    capturedBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.startCountdown = () => {
            let timer = 3;
            const btn = document.getElementById('mainSosBtn');
            btn.onclick = null; // Disable click during countdown
            
            const interval = setInterval(() => {
                btn.innerText = timer;
                timer--;
                if(timer < 0) {
                    clearInterval(interval);
                    triggerSOS();
                }
            }, 1000);
        };

        const triggerSOS = () => {
            const overlay = document.getElementById('lock-overlay');
            overlay.style.display = 'flex'; // LOCK THE SCREEN
            
            const userInfo = JSON.parse(localStorage.getItem('b_alert_user'));

            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    await addDoc(collection(db, "alerts"), {
                        sender: userInfo.name,
                        phone: userInfo.phone,
                        category: selectedCategory,
                        latitude: pos.coords.latitude,
                        longitude: pos.coords.longitude,
                        photo_proof: capturedBase64 || "No photo",
                        status: "Pending",
                        timestamp: serverTimestamp()
                    });

                    // Update UI upon success
                    document.getElementById('loading-spinner').style.display = 'none';
                    document.getElementById('lock-header').innerText = "HELP IS ON THE WAY!";
                    document.getElementById('lock-header').style.color = "#4caf50";
                    document.getElementById('lock-msg').innerHTML = `
                        Alert received by <b>${selectedCategory.toUpperCase()}</b> Department.<br><br>
                        Responders have your location.<br>
                        Stay where you are and stay safe.
                    `;

                } catch (e) {
                    alert("System Error. Check your internet and try again.");
                    overlay.style.display = 'none';
                    document.getElementById('mainSosBtn').onclick = startCountdown;
                    document.getElementById('mainSosBtn').innerText = "SOS";
                }
            }, (err) => {
                alert("GPS Error. Please enable Location/GPS to send SOS.");
                overlay.style.display = 'none';
                document.getElementById('mainSosBtn').onclick = startCountdown;
                document.getElementById('mainSosBtn').innerText = "SOS";
            }, { enableHighAccuracy: true });
        };
    </script>
</body>
</html>
