<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-ALERT SOS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; background-color: #f4f4f4; }
        .header { background-color: #e65100; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { padding: 30px 20px; }
        
        .category-label { font-weight: bold; margin-bottom: 15px; color: #333; display: block; }
        .categories { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .chip { 
            padding: 10px 20px; border-radius: 20px; border: 2px solid #ccc; 
            background: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .chip.active { background: #e65100; color: white; border-color: #e65100; }

        .sos-btn { 
            background: radial-gradient(#ff1744, #b71c1c); color: white; border: none; 
            width: 250px; height: 250px; border-radius: 50%; 
            font-size: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(183, 28, 28, 0.4);
            transition: transform 0.2s;
            margin: 10px auto;
            display: flex; align-items: center; justify-content: center;
        }
        .sos-btn:active { transform: scale(0.95); }
        
        .cancel-btn {
            display: none; background: #555; color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-size: 18px;
            font-weight: bold; cursor: pointer; margin: 20px auto;
        }

        #status { margin-top: 30px; font-size: 18px; color: #555; font-weight: bold; }
        #countdown-display { font-size: 80px; color: white; display: none; }
    </style>
</head>
<body>
    <div class="header">B-ALERT BATARAZA</div>
    <div class="container">
        <span class="category-label">Select Type of Emergency:</span>
        <div class="categories">
            <div class="chip active" onclick="selectCategory('Medical', this)">Medical 🏥</div>
            <div class="chip" onclick="selectCategory('Fire', this)">Fire 🚒</div>
            <div class="chip" onclick="selectCategory('Police', this)">Police 👮</div>
        </div>

        <button class="sos-btn" id="mainSosBtn" onclick="startSOSCountdown()">
            <span id="sos-text">SOS</span>
            <span id="countdown-display">3</span>
        </button>

        <button class="cancel-btn" id="cancelBtn" onclick="cancelSOS()">CANCEL SOS</button>
        
        <p id="status">Ready to send emergency alert</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk",
            authDomain: "b-alert-bataraza.firebaseapp.com",
            projectId: "b-alert-bataraza",
            storageBucket: "b-alert-bataraza.firebasestorage.app",
            messagingSenderId: "482644532182",
            appId: "1:482644532182:web:08c5ad48bb227e0b4fe277"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedCategory = "Medical";
        let lastKnownPosition = null;
        let countdownTimer = null;

        // PRE-FETCH: Kumuha agad ng lokasyon pagka-load
        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { lastKnownPosition = pos; },
                    null,
                    { enableHighAccuracy: true }
                );
            }
        };

        window.selectCategory = function(cat, element) {
            selectedCategory = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            if (navigator.vibrate) { navigator.vibrate(50); }
        };

        window.startSOSCountdown = function() {
            let timeLeft = 3;
            const statusText = document.getElementById('status');
            const sosText = document.getElementById('sos-text');
            const countdownDisplay = document.getElementById('countdown-display');
            const cancelBtn = document.getElementById('cancelBtn');
            const mainBtn = document.getElementById('mainSosBtn');

            sosText.style.display = 'none';
            countdownDisplay.style.display = 'block';
            countdownDisplay.innerText = timeLeft;
            cancelBtn.style.display = 'block';
            mainBtn.onclick = null; 

            statusText.innerText = `Sending ${selectedCategory} alert in...`;
            
            countdownTimer = setInterval(() => {
                timeLeft--;
                countdownDisplay.innerText = timeLeft;
                if (navigator.vibrate) { navigator.vibrate(100); }

                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    triggerSOS();
                }
            }, 1000);
        };

        window.cancelSOS = function() {
            clearInterval(countdownTimer);
            document.getElementById('sos-text').style.display = 'block';
            document.getElementById('countdown-display').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('status').innerText = "SOS Cancelled.";
            setTimeout(() => {
                document.getElementById('mainSosBtn').onclick = startSOSCountdown;
                document.getElementById('status').innerText = "Ready to send emergency alert";
            }, 1000);
        };

        const triggerSOS = () => {
            const statusText = document.getElementById('status');
            document.getElementById('countdown-display').style.display = 'none';
            document.getElementById('sos-text').style.display = 'block';
            document.getElementById('sos-text').innerText = "SENDING";
            document.getElementById('cancelBtn').style.display = 'none';
            
            statusText.innerText = "Locating & Sending SOS...";

            const backupLat = 8.3542; 
            const backupLng = 117.3515; 

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { sendToFirebase(pos.coords.latitude, pos.coords.longitude, true); },
                    (err) => { sendToFirebase(backupLat, backupLng, false); },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                sendToFirebase(backupLat, backupLng, false);
            }
        };

        const sendToFirebase = async (lat, lng, isRealGPS) => {
            try {
                await addDoc(collection(db, "alerts"), {
                    sender: "Ella - Student OJT",
                    category: selectedCategory,
                    latitude: lat,
                    longitude: lng,
                    status: "Pending",
                    has_real_gps: isRealGPS,
                    timestamp: serverTimestamp()
                });
                document.getElementById('status').innerText = `✅ ${selectedCategory.toUpperCase()} ALERT SENT!`;
                document.getElementById('status').style.color = "green";
                document.getElementById('sos-text').innerText = "SOS";
                document.getElementById('mainSosBtn').onclick = startSOSCountdown;
            } catch (e) {
                document.getElementById('status').innerText = "❌ Error sending alert.";
                document.getElementById('mainSosBtn').onclick = startSOSCountdown;
            }
        };
    </script>
</body>
</html>
