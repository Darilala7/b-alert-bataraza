<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BFP - Fire Monitoring</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ffebee; margin: 0; }
        .nav { background: #b71c1c; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; position: relative; }
        .status-indicator { position: absolute; right: 20px; top: 20px; font-size: 14px; padding: 5px 10px; border-radius: 20px; background: #4caf50; color: white; }
        .status-offline { background: #000; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; border-left: 12px solid #f44336; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card.resolved { opacity: 0.6; border-left-color: #4caf50; }
        .time-ago { color: #b71c1c; font-weight: bold; }
        .btn-maps { display: block; background: #b71c1c; color: white; text-decoration: none; padding: 12px; border-radius: 5px; font-weight: bold; margin-top: 15px; text-align: center; }
        .btn-resolved { background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        
        .photo-container { margin-top: 12px; text-align: center; }
        .photo-thumb { width: 100%; max-height: 250px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid #b71c1c; }
    </style>
</head>
<body>
    <div class="nav">🚒 BFP FIRE DASHBOARD <span id="connection-status" class="status-indicator">ONLINE</span></div>
    <div class="container" id="alerts-list"></div>

    <script type="module">
    // 1. Added serverTimestamp to imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc, enableNetwork, disableNetwork, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAqXw1f4IpeBYwgTNkpL94kyv6EOyO8VZk", projectId: "b-alert-bataraza" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ... (Keep your existing getTimeAgo function)

    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('alerts-list');
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added" && !isInitialLoad && change.doc.data().status === "Pending") {
                siren.play().catch(e => {});
                if (Notification.permission === "granted") new Notification("🔥 FIRE ALERT", { body: `Sender: ${change.doc.data().sender}` });
            }
        });
        isInitialLoad = false;
        list.innerHTML = "";
        snapshot.forEach((alertDoc) => {
            const data = alertDoc.data();
            
            // 2. Format the Resolved Log time
            const resolvedTime = data.resolved_at ? data.resolved_at.toDate().toLocaleString('en-PH') : "N/A";
            
            const gMapsLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
            const card = document.createElement('div');
            card.className = `card ${data.status === "Resolved" ? 'resolved' : ''}`;
            card.innerHTML = `
                <div style="color:${data.status === "Resolved" ? '#2e7d32' : '#b71c1c'}; font-weight:bold;">
                    ${data.status === "Resolved" ? '✅ RESOLVED' : '⚠️ FIRE INCIDENT'}
                </div>

                ${data.status === "Resolved" ? 
                    `<div style="font-size: 0.85em; color: #2e7d32; margin: 5px 0;">
                        <strong>Resolved on:</strong> ${resolvedTime}
                    </div>` : ''}

                <div style="margin:5px 0;"><strong>Sender Name:</strong> ${data.sender}</div>
                <div style="margin:5px 0;"><strong>Phone Number:</strong> ${data.phone || 'N/A'}</div>
                <div style="margin:5px 0;"><strong>Reported:</strong> <span class="time-ago">${getTimeAgo(data.timestamp)}</span></div>
                
                ${data.photo_proof && data.photo_proof !== "No photo" ? 
                    `<span style="color: #b71c1c; font-weight: bold; cursor: pointer; text-decoration: underline; display: block; margin-top: 8px; font-size: 14px;" 
                           onclick="this.nextElementSibling.style.display='block'; this.style.display='none'">🖼️ VIEW PHOTO PROOF</span>
                     <img src="${data.photo_proof}" 
                          style="width: 100%; max-width: 400px; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #ddd; cursor: zoom-out;" 
                          onclick="this.style.display='none'; this.previousElementSibling.style.display='block'">` 
                    : '<div style="margin:5px 0;"><em>No photo provided</em></div>'}

                <a href="${gMapsLink}" target="_blank" class="btn-maps">📍 VIEW LOCATION ON MAP</a>
                ${data.status !== "Resolved" ? `<button class="btn-resolved" onclick="markAsResolved('${alertDoc.id}')">MARK AS RESOLVED</button>` : ''}
            `;
            list.appendChild(card);
        });
    });

    // 3. Updated markAsResolved with English messages and Log Logic
    window.markAsResolved = async (id) => { 
        const confirmResolve = confirm("Are you sure you want to mark this fire incident as RESOLVED?");
        if (confirmResolve) {
            try {
                await updateDoc(doc(db, "alerts", id), { 
                    status: "Resolved",
                    resolved_at: serverTimestamp() 
                });
                alert("Incident successfully marked as resolved.");
            } catch (e) {
                console.error("Update Error:", e);
                alert("System error: Unable to update status.");
            }
        }
    };
</script>
</body>
</html>
